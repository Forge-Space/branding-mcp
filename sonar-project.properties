sonar.projectKey=Forge-Space_branding-mcp
sonar.organization=forge-space
sonar.projectName=branding-mcp

sonar.sources=src/lib
sonar.tests=src/__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts

sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts

# Coverage exclusions (non-testable infrastructure and configuration)
sonar.coverage.exclusions=\
  src/lib/config.ts,\
  src/lib/logger.ts,\
  src/lib/branding-core/documents/**,\
  src/lib/branding-core/validators/token-schema.ts,\
  src/lib/branding-core/ai/claude-interpreter.ts,\
  src/lib/branding-core/ai/prompts.ts

# CPD exclusions (duplicate code patterns in brand generators that legitimately share similar structure)
sonar.cpd.exclusions=\
  src/lib/branding-core/generators/brand-*.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts
