name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          [ "$TAG_VERSION" = "$PKG_VERSION" ] || {
            echo "Error: tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          }

      - run: npm run validate
      - run: npm run typecheck
      - run: npm run build
      - run: npm run registry:check

  publish:
    name: Publish npm package and MCP metadata
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install MCP publisher
        env:
          MCP_PUBLISHER_VERSION: 'v1.5.0'
        run: |
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          ARCHIVE="mcp-publisher_${OS}_${ARCH}.tar.gz"
          BASE_URL="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}"
          curl -fsSL "${BASE_URL}/${ARCHIVE}" -o "${ARCHIVE}"
          curl -fsSL "${BASE_URL}/registry_${MCP_PUBLISHER_VERSION#v}_checksums.txt" -o checksums.txt
          grep "${ARCHIVE}" checksums.txt | sha256sum -c -
          tar xz -f "${ARCHIVE}" mcp-publisher
          chmod +x mcp-publisher
          rm "${ARCHIVE}" checksums.txt

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

  release:
    name: Create GitHub release
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: softprops/action-gh-release@1853d73993c8ca1b2c9c1a7fede39682d0ab5c2a # v2.5.3
        with:
          generate_release_notes: true
